    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

var MAPS = {
    gost: {
        'а':'a','б':'b','в':'v','г':'g','д':'d',
        'е':'e','ё':'ë','ж':'ž','з':'z','и':'i',
        'й':'j','к':'k','л':'l','м':'m','н':'n',
        'о':'o','п':'p','р':'r','с':'s','т':'t',
        'у':'u','ф':'f','х':'h','ц':'c','ч':'č',
        'ш':'š','щ':'ŝ','ъ':'ʺ','ы':'y','ь':'ʹ',
        'э':'è','ю':'û','я':'â'
    },
    gost_r: {
        'а':'a','б':'b','в':'v','г':'g','д':'d',
        'е':'e','ё':'e','ж':'zh','з':'z','и':'i',
        'й':'i','к':'k','л':'l','м':'m','н':'n',
        'о':'o','п':'p','р':'r','с':'s','т':'t',
        'у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch',
        'ш':'sh','щ':'shch','ъ':'ie','ы':'y','ь':'',
        'э':'e','ю':'iu','я':'ia'
    },
    icao: {
        'а':'a','б':'b','в':'v','г':'g','д':'d',
        'е':'e','ё':'e','ж':'zh','з':'z','и':'i',
        'й':'i','к':'k','л':'l','м':'m','н':'n',
        'о':'o','п':'p','р':'r','с':'s','т':'t',
        'у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch',
        'ш':'sh','щ':'shch','ъ':'','ы':'y','ь':'',
        'э':'e','ю':'iu','я':'ia'
    },
    yandex: {
        'а':'a','б':'b','в':'v','г':'g','д':'d',
        'е':'e','ё':'e','ж':'zh','з':'z','и':'i',
        'й':'i','к':'k','л':'l','м':'m','н':'n',
        'о':'o','п':'p','р':'r','с':'s','т':'t',
        'у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch',
        'ш':'sh','щ':'shch','ъ':'','ы':'y','ь':'',
        'э':'e','ю':'yu','я':'ya'
    }
};

var VOWELS = 'аеёиоуыэюяaeiouy';

function transliterateChar(ch, map, prevCh) {
    var lower = ch.toLowerCase();
    if (map[lower] === undefined) return ch;

    var mapped = map[lower];

    if (ch !== lower) {
        mapped = mapped.charAt(0).toUpperCase() + mapped.slice(1);
    }

    if (map === MAPS.yandex && lower === 'е') {
        if (!prevCh || VOWELS.indexOf(prevCh.toLowerCase()) !== -1 || prevCh === ' ' || prevCh === '\n') {
            mapped = ch !== lower ? 'Ye' : 'ye';
        }
    }

    return mapped;
}

function transliterate(text, standard) {
    var map = MAPS[standard];
    if (!text) return '';

    var chars = text.split('');
    var result = '';

    for (var i = 0; i < chars.length; i++) {
        var prev = i > 0 ? chars[i - 1] : '';
        result += transliterateChar(chars[i], map, prev);
    }

    return result;
}

var inputEl = document.getElementById('inputText');
var standardEl = document.getElementById('standard');
var outputEl = document.getElementById('output');
var copyBtn = document.getElementById('copyBtn');
var clearBtn = document.getElementById('clearBtn');
var charCountEl = document.getElementById('charCount');
var wordCountEl = document.getElementById('wordCount');
var translitCountEl = document.getElementById('translitCount');

function update() {
    var text = inputEl.value;
    var standard = standardEl.value;
    var result = transliterate(text, standard);

    outputEl.textContent = result || '';

    var charCount = text.length;
    var words = text.trim() ? text.trim().split(/\s+/).length : 0;
    var translitLen = result.length;

    charCountEl.textContent = charCount;
    wordCountEl.textContent = words;
    translitCountEl.textContent = translitLen;
}

inputEl.addEventListener('input', update);
standardEl.addEventListener('change', update);

copyBtn.addEventListener('click', function() {
    var text = outputEl.textContent;
    if (!text) return;
    var btn = this;
    navigator.clipboard.writeText(text).then(function() {
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1800);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1800);
    });
});

clearBtn.addEventListener('click', function() {
    inputEl.value = '';
    update();
    inputEl.focus();
});

update();
</script>
