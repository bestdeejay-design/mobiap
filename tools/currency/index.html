<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

// --- Currency Converter Logic ---
var rates = {
    RUB: 1,
    USD: 90,
    EUR: 98,
    CNY: 12.5,
    GBP: 114,
    JPY: 0.6,
    KZT: 0.19,
    BYN: 28,
    AMD: 0.23,
    UZS: 0.007,
    TRY: 2.8,
    AED: 24.5,
    THB: 2.5
};

var amountInput = document.getElementById('amount');
var fromSelect = document.getElementById('fromCurrency');
var toSelect = document.getElementById('toCurrency');
var convertBtn = document.getElementById('convertBtn');
var resultText = document.getElementById('resultText');

function formatNum(n) {
    if (Math.abs(n) < 0.0001 && n !== 0) return n.toExponential(4);
    if (n >= 1) {
        var s = n.toFixed(4).replace(/\.?0+$/, '');
        return parseFloat(s).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 4 });
    }
    return n.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 6 });
}

function convert() {
    var amount = parseFloat(amountInput.value) || 0;
    var from = fromSelect.value;
    var to = toSelect.value;
    var rubAmount = amount * rates[from];
    var result = rubAmount / rates[to];
    if (amount === 0) {
        resultText.textContent = '0';
    } else if (from === to) {
        resultText.textContent = formatNum(result) + ' ' + to;
    } else {
        resultText.innerHTML = formatNum(amount) + ' ' + from + ' = ' + formatNum(result) + ' ' + to;
    }
}

convertBtn.addEventListener('click', convert);
amountInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') convert(); });
fromSelect.addEventListener('change', convert);
toSelect.addEventListener('change', convert);

convert();
</script>
