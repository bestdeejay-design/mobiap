<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

var WORDS = [
    'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
    'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
    'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
    'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo',
    'consequat', 'duis', 'aute', 'irure', 'dolor', 'in', 'reprehenderit', 'voluptate',
    'velit', 'esse', 'cillum', 'eu', 'fugiat', 'nulla', 'pariatur', 'excepteur',
    'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui',
    'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum',
    'a', 'ab', 'accusamus', 'accusantium', 'aliquid', 'aperiam', 'architecto',
    'atque', 'aut', 'beatae', 'cum', 'dicta', 'dignissimos', 'distinctio',
    'earum', 'eligendi', 'eos', 'error', 'expedita', 'facere', 'fuga',
    'harum', 'hic', 'illo', 'illum', 'impedit', 'inventore', 'ipsa',
    'iste', 'iure', 'iusto', 'laboriosam', 'libero', 'maiores', 'maxime',
    'minima', 'minus', 'modi', 'molestiae', 'molestias', 'nam', 'natus',
    'necessitatibus', 'neque', 'nobis', 'numquam', 'omnis', 'optio', 'placeat',
    'porro', 'possimus', 'praesentium', 'quae', 'quaerat', 'quas', 'quasi',
    'quia', 'quibusdam', 'quidem', 'quo', 'quod', 'ratione', 'recusandae',
    'rem', 'rerum', 'saepe', 'sapiente', 'similique', 'soluta', 'tempore',
    'temporibus', 'totam', 'tristique', 'tincidunt', 'ultricies', 'viverra',
    'turpis', 'voluptas', 'voluptatem', 'voluptatibus'
];

var typeSelect = document.getElementById('typeSelect');
var countInput = document.getElementById('countInput');
var generateBtn = document.getElementById('generateBtn');
var output = document.getElementById('output');
var copyBtn = document.getElementById('copyBtn');

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pickWord() {
    return WORDS[Math.floor(Math.random() * WORDS.length)];
}

function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

function generateWords(count) {
    var result = [];
    for (var i = 0; i < count; i++) {
        result.push(pickWord());
    }
    return result.join(' ');
}

function generateSentence() {
    var len = rand(5, 12);
    var words = [];
    for (var i = 0; i < len; i++) {
        words.push(pickWord());
    }
    return capitalize(words.join(' ')) + '.';
}

function generateSentences(count) {
    var result = [];
    for (var i = 0; i < count; i++) {
        result.push(generateSentence());
    }
    return result.join(' ');
}

function generateParagraph() {
    var len = rand(3, 7);
    var sentences = [];
    for (var i = 0; i < len; i++) {
        sentences.push(generateSentence());
    }
    return sentences.join(' ');
}

function generateParagraphs(count) {
    var result = [];
    for (var i = 0; i < count; i++) {
        result.push(generateParagraph());
    }
    return result.join('\n\n');
}

generateBtn.addEventListener('click', function() {
    var type = typeSelect.value;
    var count = parseInt(countInput.value, 10);
    if (isNaN(count) || count < 1) count = 1;
    if (count > 100) count = 100;

    var text = '';
    switch (type) {
        case 'words':
            text = generateWords(count);
            break;
        case 'sentences':
            text = generateSentences(count);
            break;
        case 'paragraphs':
            text = generateParagraphs(count);
            break;
    }
    output.textContent = text;
    output.style.color = '';
});

copyBtn.addEventListener('click', function() {
    var text = output.textContent;
    if (!text || text === 'Нажмите «Сгенерировать», чтобы создать текст…') return;
    navigator.clipboard.writeText(text).then(function() {
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.classList.remove('copied'); }, 2000);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.classList.remove('copied'); }, 2000);
    });
});
</script>
