<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

// Tool-specific JS
var TEMPLATES = [
    {
        id: 'launch',
        name: 'Запуск сайта',
        items: [
            'Домен подключён',
            'Хостинг активирован',
            'SSL-сертификат установлен',
            'База данных создана',
            'CMS установлена',
            'Все страницы созданы',
            'Мета-теги заполнены',
            'Sitemap.xml создан',
            'robots.txt настроен',
            'Аналитика подключена',
            'Формы работают',
            'Мобильная версия проверена',
            'Скорость проверена',
            '404 страница настроена',
            'Резервное копирование настроено'
        ]
    },
    {
        id: 'seo',
        name: 'SEO-аудит',
        items: [
            'robots.txt',
            'sitemap.xml',
            'Заголовки H1-H3',
            'meta-descriptions',
            'Alt-теги изображений',
            'Скорость загрузки',
            'Мобильная версия',
            'Битые ссылки',
            'Структура URL',
            'SSL/HTTPS',
            'Канонические URL',
            'Schema.org разметка'
        ]
    },
    {
        id: 'dev',
        name: 'Разработка',
        items: [
            'Git репозиторий',
            'Ветка разработки',
            'CI/CD',
            'Unit-тесты',
            'Code review',
            'Безопасность',
            'Документация',
            'Кросс-браузерность',
            'Деплой на staging',
            'Approval заказчика'
        ]
    },
    {
        id: 'design',
        name: 'Дизайн',
        items: [
            'Референсы',
            'Структура страниц',
            'Прототип',
            'Утверждение прототипа',
            'Визуальный дизайн',
            'UI-kit',
            'Типографика',
            'Цветовая палитра',
            'Мокапы экранов',
            'Адаптивный дизайн',
            'Передача в разработку'
        ]
    }
];

var STORAGE_KEY = 'axiiom_checklist_state';
var activeTemplateId = null;

function getState() {
    try {
        return JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || {};
    } catch (e) {
        return {};
    }
}

function saveState(state) {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getChecked(templateId) {
    var state = getState();
    return state[templateId] || [];
}

function setChecked(templateId, indices) {
    var state = getState();
    state[templateId] = indices;
    saveState(state);
}

function initTabs() {
    var container = document.getElementById('templateTabs');
    container.innerHTML = '';
    for (var i = 0; i < TEMPLATES.length; i++) {
        var t = TEMPLATES[i];
        var btn = document.createElement('button');
        btn.className = 'template-btn' + (i === 0 ? ' tool-btn active' : ' tool-btn-secondary');
        btn.textContent = t.name;
        btn.dataset.templateId = t.id;
        btn.addEventListener('click', function() {
            switchTemplate(this.dataset.templateId);
        });
        container.appendChild(btn);
    }
}

function switchTemplate(templateId) {
    activeTemplateId = templateId;
    var btns = document.querySelectorAll('.template-btn');
    for (var i = 0; i < btns.length; i++) {
        var btn = btns[i];
        var isActive = btn.dataset.templateId === templateId;
        btn.className = 'template-btn' + (isActive ? ' tool-btn active' : ' tool-btn-secondary');
    }
    renderChecklist(templateId);
}

function renderChecklist(templateId) {
    var template = null;
    for (var i = 0; i < TEMPLATES.length; i++) {
        if (TEMPLATES[i].id === templateId) {
            template = TEMPLATES[i];
            break;
        }
    }
    if (!template) return;

    var container = document.getElementById('checklistContainer');
    var checked = getChecked(templateId);
    container.innerHTML = '';

    for (var j = 0; j < template.items.length; j++) {
        var item = template.items[j];
        var label = document.createElement('label');
        label.className = 'checkbox-label' + (checked.indexOf(j) !== -1 ? ' checked' : '');

        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked.indexOf(j) !== -1;
        cb.dataset.index = j;

        cb.addEventListener('change', function() {
            var idx = parseInt(this.dataset.index);
            onCheckChange(templateId, idx, this.checked);
        });

        label.appendChild(cb);
        label.appendChild(document.createTextNode(' ' + item));
        container.appendChild(label);
    }

    updateProgress(templateId);
}

function onCheckChange(templateId, index, checked) {
    var current = getChecked(templateId);
    var idx = current.indexOf(index);

    if (checked && idx === -1) {
        current.push(index);
        current.sort(function(a, b) { return a - b; });
    } else if (!checked && idx !== -1) {
        current.splice(idx, 1);
    }

    setChecked(templateId, current);
    renderChecklist(templateId);
}

function updateProgress(templateId) {
    var template = null;
    for (var i = 0; i < TEMPLATES.length; i++) {
        if (TEMPLATES[i].id === templateId) {
            template = TEMPLATES[i];
            break;
        }
    }
    if (!template) return;

    var checked = getChecked(templateId);
    var total = template.items.length;
    var done = checked.length;
    var pct = total > 0 ? (done / total) * 100 : 0;

    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' из ' + total + ' выполнено';
}

function resetChecked() {
    if (!activeTemplateId) return;
    var template = null;
    for (var i = 0; i < TEMPLATES.length; i++) {
        if (TEMPLATES[i].id === activeTemplateId) {
            template = TEMPLATES[i];
            break;
        }
    }
    if (!template || template.items.length === 0) return;
    if (!confirm('Сбросить все отметки в шаблоне "' + template.name + '"?')) return;

    setChecked(activeTemplateId, []);
    renderChecklist(activeTemplateId);
}

(function init() {
    initTabs();
    switchTemplate(TEMPLATES[0].id);
    document.getElementById('resetBtn').addEventListener('click', resetChecked);
})();
</script>
