<script>
(function() {
    var grid = document.getElementById('blogGrid');

    function formatDate(str) {
        var d = new Date(str + 'T00:00:00');
        var months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    var BLOG_ICONS = {
  'highload-architecture': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="6" rx="1"/><rect x="8" y="14" width="8" height="6" rx="1"/><path d="M12 10v4"/><path d="M8 20H4"/><path d="M16 20h4"/></svg>',

  'fintech-trends-2026': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 20h18"/><path d="M7 16v-4"/><path d="M12 16v-6"/><path d="M17 16V8"/><path d="M21 8l-4-4-4 4"/></svg>',
  'loyalty-program-roi': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v10"/><path d="M7 12h10"/></svg>',
  '161-fz-guideline': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 3v4a1 1 0 001 1h4"/><path d="M17 21H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v11a2 2 0 01-2 2z"/><path d="M9 12h6"/><path d="M9 16h4"/></svg>',
  'mobile-payment-ux': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/><path d="M9 6h6"/></svg>',
  'loyalty-platform-not-option-necessity': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
};

function renderList() {
        grid.innerHTML = POSTS.map(function(p) {
            var icon = BLOG_ICONS[p.slug] || '';
            return '<a href="/blog/' + p.slug + '/" class="tool-card blog-card reveal">' +
                '<div class="tool-icon">' + icon + '</div>' +
                '<h3>' + p.title + '</h3>' +
                '<p>' + p.desc + '</p>' +
                '<span class="blog-read">Читать →</span>' +
            '</a>';
        }).join('');
    }

    var initialSlug = window.location.hash.replace('#', '');
    if (initialSlug && POSTS.some(function(p) { return p.slug === initialSlug; })) {
        window.location.replace('/blog/' + initialSlug + '/');
    } else {
        renderList();
    }

    window.addEventListener('hashchange', function() {
        var slug = window.location.hash.replace('#', '');
        if (slug && POSTS.some(function(p) { return p.slug === slug; })) {
            window.location.replace('/blog/' + slug + '/');
        }
    });


    // Header scroll
    var header = document.getElementById('header');
    window.addEventListener('scroll', function() {
        header.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    // Reveal animation
    var reveals = document.querySelectorAll('.reveal');
    var ro = new IntersectionObserver(function(e) {
        e.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.15 });
    reveals.forEach(function(r) { ro.observe(r); });
})();
</script>
